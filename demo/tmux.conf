##############################
# custom tmux.conf
##############################

# Use zsh as default shell
set-option -g default-shell /bin/bash

# Setting the prefix from C-b to C-f
set -g prefix C-f
# Free the original Ctrl-b prefix keybinding
unbind C-b

#setting the delay between prefix and command
set -sg escape-time 1

# Ensure that we can send Ctrl-A to other apps
bind C-f send-prefix

# Set the base index for windows to 1 instead of 0
set -g base-index 1
# Set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# Reload the file with Prefix r
bind r source-file ~/.custom_tmux/tmux.conf \; display "Reloaded!"

# splitting panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window navigation
# Cycle through windows with Ctrl+p
bind -n C-p next-window

# Direct access to windows with prefix+Number (AZERTY layout)
bind & select-window -t 1
bind é select-window -t 2
bind '"' select-window -t 3
bind "'" select-window -t 4
bind ( select-window -t 5

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Set the default terminal mode to 256color mode
set -g default-terminal "screen-256color"

# enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# Configuration du renommage automatique des fenêtres
# Affiche le répertoire courant + commande en cours
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}: #{pane_current_command}'
set-option -g allow-rename off

######################
### DESIGN CHANGES ###
######################

# Solarized Light color scheme
# Based on https://github.com/seebi/tmux-colors-solarized

# Solarized Light colors
# base03    = colour234
# base02    = colour235
# base01    = colour240
# base00    = colour241
# base0     = colour244
# base1     = colour245
# base2     = colour254
# base3     = colour230
# yellow    = colour136
# orange    = colour166
# red       = colour160
# magenta   = colour125
# violet    = colour61
# blue      = colour33
# cyan      = colour37
# green     = colour64

# Default terminal
set -g default-terminal "screen-256color"

# Panes borders
set -g pane-border-style bg=colour254,fg=colour245
set -g pane-active-border-style '#{?pane_in_mode,bg=colour254 fg=colour37,bg=colour254 fg=colour33}'

# Status bar
set -g status-position bottom
set -g status-style '#{?pane_in_mode,bg=colour37 fg=colour230,bg=colour254 fg=colour240}'
set -g status-left '#{?pane_in_mode,#[bg=colour33#,fg=colour230#,bold] ▓▓▓ COPY MODE ▓▓▓ ,}'
set -g status-right '#(~/.local/bin/tmux-asciinema-status) #(~/.local/bin/tmux-vpn-status) #{?pane_in_mode,#[fg=colour230],#[fg=colour244]} %d/%m #{?pane_in_mode,#[fg=colour230#,bold],#[fg=colour240#,bold]} %H:%M:%S '
set -g status-right-length 80
set -g status-left-length 40
set -g status-interval 2
set -g status-justify left

# Window status
setw -g window-status-style fg=colour240,bg=colour254,none
setw -g window-status-format ' #I:#W#F '

setw -g window-status-current-style '#{?pane_in_mode,fg=colour230 bg=colour33 bold,fg=colour254 bg=colour33 bold}'
setw -g window-status-current-format ' #I:#W#F '

setw -g window-status-activity-style fg=colour160,bg=colour254,none
setw -g window-status-bell-style fg=colour160,bg=colour254,bold

# Messages
set -g message-style fg=colour230,bg=colour33,bold
set -g message-command-style fg=colour230,bg=colour33,bold

# Mode (copy mode, etc)
setw -g mode-style bg=colour136,fg=colour230,bold

# Clock mode
setw -g clock-mode-colour colour33

# Activity monitoring
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

######################
###     TOOLS      ###
######################

# enable vi keys.
setw -g mode-keys vi
unbind [
unbind p
bind p paste-buffer

# Enter copy-mode with Ctrl+Space (no prefix needed)
bind -n C-Space copy-mode

# Copy-mode vi navigation
bind-key -T copy-mode-vi C-k send-keys -X halfpage-up
bind-key -T copy-mode-vi C-j send-keys -X halfpage-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Exit copy-mode with q or Ctrl+Space (toggle)
bind-key -T copy-mode-vi C-Space send-keys -X cancel

# Copy to clipboard
bind C-c run "tmux save-buffer - | pbcopy"

# Log output to a text file on demand
bind P pipe-pane -o "cat >>~/#W.log" \; display "Toggled logging to ~/#W.log"

# Clear History with PREFIX-k"
bind k send-keys "clear"\; send-keys "Enter"\; run-shell "sleep .3s" \; clear-history \; display "History cleared"

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Afficher le nom des panes
set -g pane-border-status top
set -g pane-border-format " [ #P: #{pane_title} ] "

######################
### CUSTOM COMMANDS ###
######################

# Window management
set-option -g command-alias[0] window-close='kill-window'
set-option -g command-alias[1] window-new='new-window -c "#{pane_current_path}"'
set-option -g command-alias[2] window-rename='rename-window'
set-option -g command-alias[3] window-next='next-window'
set-option -g command-alias[4] window-prev='previous-window'
set-option -g command-alias[5] window-list='list-windows'

# Pane management
set-option -g command-alias[6] pane-close='kill-pane'
set-option -g command-alias[7] pane-split-h='split-window -h -c "#{pane_current_path}"'
set-option -g command-alias[8] pane-split-v='split-window -v -c "#{pane_current_path}"'
set-option -g command-alias[9] pane-fullscreen='resize-pane -Z'
set-option -g command-alias[10] pane-break='break-pane'
set-option -g command-alias[11] pane-list='list-panes'
set-option -g command-alias[12] pane-rename='select-pane -T'

# Session management
set-option -g command-alias[13] session-new='new-session'
set-option -g command-alias[14] session-close='kill-session'
set-option -g command-alias[15] session-rename='rename-session'
set-option -g command-alias[16] session-list='list-sessions'
set-option -g command-alias[17] session-switch='switch-client -t'

# Utility commands
set-option -g command-alias[18] config-reload='source-file ~/.custom_tmux/tmux.conf'
set-option -g command-alias[19] history-clear='clear-history'
set-option -g command-alias[20] config-list='display-popup -E -h 90% -w 90% "tmux list-keys | less -R"'
set-option -g command-alias[21] options-show='display-popup -E -h 90% -w 90% "tmux show-options -g | less -R"'

# Broadcast
set-option -g command-alias[22] window-broadcast='run-shell "tmux list-panes -F \"##{pane_id}\" | while read p; do tmux send-keys -t \"$p\" \"$1\" Enter; done"'
